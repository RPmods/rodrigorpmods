name: Deploy STRINOVA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Firebase runtime config
        env:
          RPMODS_FIREBASE_API_KEY: ${{ secrets.RPMODS_FIREBASE_API_KEY }}
          RPMODS_FIREBASE_AUTH_DOMAIN: ${{ secrets.RPMODS_FIREBASE_AUTH_DOMAIN }}
          RPMODS_FIREBASE_DATABASE_URL: ${{ secrets.RPMODS_FIREBASE_DATABASE_URL }}
          RPMODS_FIREBASE_PROJECT_ID: ${{ secrets.RPMODS_FIREBASE_PROJECT_ID }}
          RPMODS_FIREBASE_STORAGE_BUCKET: ${{ secrets.RPMODS_FIREBASE_STORAGE_BUCKET }}
          RPMODS_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.RPMODS_FIREBASE_MESSAGING_SENDER_ID }}
          RPMODS_FIREBASE_APP_ID: ${{ secrets.RPMODS_FIREBASE_APP_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          required = [
              "RPMODS_FIREBASE_API_KEY",
              "RPMODS_FIREBASE_AUTH_DOMAIN",
              "RPMODS_FIREBASE_DATABASE_URL",
              "RPMODS_FIREBASE_PROJECT_ID",
              "RPMODS_FIREBASE_STORAGE_BUCKET",
              "RPMODS_FIREBASE_MESSAGING_SENDER_ID",
              "RPMODS_FIREBASE_APP_ID",
          ]

          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("::error::Missing GitHub repository secrets: " + ", ".join(missing), file=sys.stderr)
              print("Add them in Settings > Secrets and variables > Actions > Repository secrets.", file=sys.stderr)
              sys.exit(1)

          config = {
              "apiKey": os.environ["RPMODS_FIREBASE_API_KEY"],
              "authDomain": os.environ["RPMODS_FIREBASE_AUTH_DOMAIN"],
              "databaseURL": os.environ["RPMODS_FIREBASE_DATABASE_URL"],
              "projectId": os.environ["RPMODS_FIREBASE_PROJECT_ID"],
              "storageBucket": os.environ["RPMODS_FIREBASE_STORAGE_BUCKET"],
              "messagingSenderId": os.environ["RPMODS_FIREBASE_MESSAGING_SENDER_ID"],
              "appId": os.environ["RPMODS_FIREBASE_APP_ID"],
          }

          target = pathlib.Path("strinova/js/firebase-env.js")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(
              "// Generated by GitHub Actions. Do not commit real Firebase runtime values.\n"
              "window.RPMODS_SERVICES_CONFIG = " + json.dumps(config, ensure_ascii=False) + ";\n",
              encoding="utf-8",
          )
          print(f"Generated {target}")
          PY

      - name: Build Pages folder with STRINOVA under /strinova/
        run: |
          set -euo pipefail
          test -f strinova/index.html

          rm -rf _site
          mkdir -p _site/strinova

          # Copy shared asset folders that may still live at repository root.
          # This fixes black videos/images when the app is published under /strinova/.
          for dir in img audio video media assets fonts; do
            if [ -d "$dir" ]; then
              mkdir -p "_site/strinova/$dir"
              rsync -a "$dir/" "_site/strinova/$dir/"
            fi
          done

          # Copy root fallback files used by older STRINOVA builds.
          for file in logo_audio.mp3; do
            if [ -f "$file" ]; then
              cp "$file" "_site/strinova/$file"
            fi
          done

          # Copy the actual STRINOVA app last, so files inside strinova/ win over root copies.
          rsync -a strinova/ _site/strinova/

          touch _site/.nojekyll
          touch _site/strinova/.nojekyll

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=./strinova/">
              <title>STRINOVA</title>
              <script>location.replace('./strinova/');</script>
            </head>
            <body>
              <p><a href="./strinova/">Open STRINOVA</a></p>
            </body>
          </html>
          HTML

          echo "Built _site. Key files:"
          find _site/strinova -maxdepth 3 -type f | sort | sed -n '1,200p'

      - name: Validate deployed STRINOVA files
        run: |
          set -euo pipefail

          required_files=(
            "_site/strinova/index.html"
            "_site/strinova/js/app.js"
            "_site/strinova/js/firebase.js"
            "_site/strinova/js/firebase-env.js"
            "_site/strinova/video/background.mp4"
            "_site/strinova/video/introV/Loading.mp4"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required deploy file: $file"
              echo "STRINOVA references this path at runtime. Put the asset inside strinova/ or keep the root asset folder so the workflow can copy it."
              exit 1
            fi
          done

          if ! grep -q "window.RPMODS_SERVICES_CONFIG" _site/strinova/js/firebase-env.js; then
            echo "::error::firebase-env.js was created, but it does not expose window.RPMODS_SERVICES_CONFIG."
            exit 1
          fi

          echo "STRINOVA deploy validation passed."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
